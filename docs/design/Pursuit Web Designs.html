function SideNav() {

function FlowAuth() {
  return (
    <section className="flow" id="auth">
      <FlowHeader num="01 · Auth" title="Get in." em="Or back in." desc="One photo panel, one form. Reuses mobile inputs/buttons; the desktop split-screen panel is the only net-new web piece." />

      <div id="auth-1-1"></div>
      <FrameSet>
        <Frame kind="desk" name="1.1 · Splash" note="Editorial hero — sets the brand voice">
          <SplashDesk />
        </Frame>
        <Frame kind="mob" name="1.1 · Splash · mobile">
          <SplashMobile />
        </Frame>
      </FrameSet>

      <div id="auth-1-2"></div>
      <FrameSet>
        <Frame kind="desk" name="1.2 · Sign In" note="Split-screen pattern — same form components as mobile">
          <SignIn />
        </Frame>
        <Frame kind="mob" name="1.2 · Sign In · mobile">
          <SignInMobile />
        </Frame>
      </FrameSet>
      <Notes items={[
        { kind: "reuse", text: "Inputs + Auth button" },
        { kind: "reuse", text: "Google sign-in" },
        { kind: "new", text: "Split-screen photo panel" },
        { kind: "new", text: "Magic link option" },
      ]} />

      <div id="auth-1-3"></div>
      <FrameSet>
        <Frame kind="desk" name="1.3 · Sign Up" note="Same shell as Sign In, one extra field">
          <SignUp />
        </Frame>
        <Frame kind="mob" name="1.3 · Sign Up · mobile">
          <SignUpMobile />
        </Frame>
      </FrameSet>

}

      <FrameSet>
        <Frame kind="desk" name="2.1 · Interests" note="Step 1 — three or more">
          <OnbInterests />
        </Frame>
        <Frame kind="mob" name="2.1 · Interests · mobile">
          <OnbInterestsMobile />
        </Frame>
      </FrameSet>
      <Notes items={[
        { kind: "reuse", text: "Interest pill (enlarged)" },
        { kind: "reuse", text: "Category color band" },
        { kind: "new", text: "3-col grid" },
        { kind: "new", text: "Web progress dots" },
      ]} />

      <div id="onboarding-2-2"></div>
      <FrameSet>
        <Frame kind="desk" name="2.2 · Location" note="Step 2 — neighborhoods, not a map pin">
          <OnbLocation />
        </Frame>
        <Frame kind="mob" name="2.2 · Location · mobile" stubTag="Adapted from mobile">
          <div className="web web--mob">
            <header className="pnav pnav--mob" style={{background: "transparent", borderBottom: "none"}}>
              <div className="pnav__in" style={{padding: "0 20px"}}>
                <span className="pnav__brand">Pursuit</span>
                <span style={{marginLeft: "auto", fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase", color: "var(--web-ink-3)"}}>Step 2 of 3</span>
              </div>
            </header>
            <main style={{padding: "16px 20px"}}>
              <div className="ob-progress" style={{margin: 0}}>

                <div className="ob-progress__dot"></div>
              </div>
              <p className="kicker" style={{fontSize: 10, marginTop: 16}}>Where do you spend your week?</p>
              <h1 style={{fontFamily: "var(--font-primary)", fontSize: 26, fontWeight: 800, letterSpacing: "-0.025em", margin: "4px 0 14px"}}>Pick your <em style={{fontFamily: "var(--font-editorial)", fontStyle: "italic", color: "var(--deluge)", fontWeight: 400}}>neighborhoods.</em></h1>
              <div className="ob-loc-list" style={{marginTop: 8}}>
                {[
                  { name: "Westlands", sub: "Bars, brunch, nightlife", on: true },
                  { name: "Kilimani", sub: "Cafés, galleries",  on: true },
                  { name: "Karen", sub: "Gardens, weekends", on: false },
                  { name: "Lavington", sub: "Quiet, food", on: false },
                  { name: "CBD", sub: "Theatre, markets", on: false },
                ].map(n => (
                  <div key={n.name} className={"ob-loc-row" + (n.on ? " is-on" : "")} style={{padding: "12px 14px"}}>
                    <div className="ob-loc-row__pin" style={{width: 32, height: 32}}><Icon name="pin" size={16} /></div>
                    <div>
                      <div className="ob-loc-row__name">{n.name}</div>
                      <div className="ob-loc-row__sub">{n.sub}</div>

      <FrameSet>
        <Frame kind="desk" name="2.3 · Notifications" note="New for web v1 — toggles with editorial copy">
          <OnbNotifications />
        </Frame>
        <Frame kind="mob" name="2.3 · Notifications · mobile" stubTag="Same toggles, single column">
          <div className="web web--mob">
            <main style={{padding: "20px 20px 40px"}}>
              <p className="kicker" style={{fontSize: 10}}>Step 3 of 3 · Stay in the loop</p>
              <h1 style={{fontFamily: "var(--font-primary)", fontSize: 26, fontWeight: 800, letterSpacing: "-0.025em", margin: "6px 0 8px"}}>Be first to know when <em style={{fontFamily: "var(--font-editorial)", fontStyle: "italic", color: "var(--deluge)", fontWeight: 400}}>B&W</em> drops.</h1>
              <p style={{fontSize: 13, color: "var(--web-ink-2)", marginBottom: 18}}>Only events that match. No daily summaries.</p>
              <div className="ob-notif-list">
                {[
                  { icon: "ticket", h: "New events in your areas", p: "Roughly 2-3 a week.", on: true },

      </FrameSet>
      <Notes items={[
        { kind: "new", text: "Web notification toggles" },
        { kind: "new", text: "Saturday Brief opt-in (editorial product)" },

      <div id="onboarding-2-4"></div>
      <FrameSet>
        <Frame kind="desk" name="2.4 · Welcome" note="Editorial moment — first three picks below the fold">
          <OnbWelcome />
        </Frame>
        <Frame kind="mob" name="2.4 · Welcome · mobile" stubTag="Same flow, narrower">
          <div className="web web--mob">
            <main>
              <section className="ob-shell" style={{padding: "60px 20px 32px", minHeight: 600}}>
                <div className="ob-done" style={{padding: "20px 0"}}>
                  <div className="ob-done__mark" style={{width: 72, height: 72}}><Icon name="check" size={36} stroke={2.5} /></div>

      <FrameSet>
        <Frame kind="desk" name="3.1 · Discover" variation="Variation A · Editorial" note="Lean into the magazine voice — big serif moments, single editor's pick">
          <DiscoverA />
        </Frame>
        <Frame kind="mob" name="3.1 · Discover · mobile">
          <DiscoverMobile />
        </Frame>
      </FrameSet>
      <Notes items={[
        { kind: "reuse", text: "Event card · short variant" },

            <TopNav mobile />
            <main style={{padding: "16px 20px 80px"}}>
              <p className="kicker" style={{fontSize: 10}}>42 tonight</p>
              <h1 style={{fontFamily: "var(--font-primary)", fontSize: 26, fontWeight: 800, letterSpacing: "-0.025em", margin: "4px 0 14px"}}>Explore <em style={{fontFamily: "var(--font-editorial)", fontStyle: "italic", color: "var(--deluge)", fontWeight: 400}}>everything.</em></h1>

function FlowEvents() {
  return (
    <section className="flow" id="events">
      <FlowHeader num="04 · Events" title="The" em="flagship." desc="The event detail page is where the brand earns its name. Three directions, each themed entirely by the event's category variant. Checkout is M-Pesa-first." />

      <div id="events-4-1"></div>
      <FrameSet>
        <Frame kind="desk" name="4.1 · Event Detail" variation="Variation A · Cinematic" note="Full-bleed image with gradient overlay; left story column, right sticky ticket card">
          <EventDetailA />
        </Frame>
        <Frame kind="mob" name="4.1 · Event Detail · mobile" note="Sticky bottom CTA replaces the sidebar">
          <EventDetailMobile />
        </Frame>
      </FrameSet>
      <Notes items={[
        { kind: "reuse", text: "Category band + accent" },

      <FrameSet>
        <Frame kind="desk" name="4.2 · Checkout · Details" note="Step 2 — attendee form">
